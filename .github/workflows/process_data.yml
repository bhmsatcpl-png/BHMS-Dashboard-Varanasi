name: Process Bridge Sensor Data

on:
  push:
    paths:
      - 'data/*.xlsx'        # Triggers when ANY .xlsx file in data/ changes/is added
      - '**/*.xlsx'         # Or triggers on any Excel file anywhere in the repo
  workflow_dispatch:        # Allows manual run from GitHub UI

jobs:
  process-sensor-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl numpy

      - name: Run Processing Script
        run: |
          python process_data.py

      - name: Commit and push processed output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update processed sensor data [skip ci]" && git push)
