name: Process Bridge Sensor Data

on:
  push:
    paths:
      - 'data/*.xlsx'
      - '**/*.xlsx'
  workflow_dispatch:

jobs:
  process-sensor-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        # Pinning actions/checkout@v4 to commit SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # Pinning actions/setup-python@v5 to commit SHA
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl numpy

      - name: Run Processing Script
        run: |
          python process_data.py

      - name: Commit and push processed output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update processed sensor data [skip ci]" && git push)
