<!DOCTYPE html>
<html>
<head>
  <title>Bridge SHM Live Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body style="font-family: Arial; margin: 20px;">
  <h2>🌉 Bridge Health Monitoring Dashboard</h2>
  <div id="strain_chart" style="width:100%;height:400px;"></div>
  <div id="acc_chart" style="width:100%;height:400px;"></div>

  <script>
    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        const timestamps = data.map(row => row.Timestamp);
        
        // 12 Strain Gauge Lines
        let strainTraces = [];
        for(let i=1; i<=12; i++) {
          strainTraces.push({
            x: timestamps,
            y: data.map(row => row[`SG_${i}`]),
            name: `SG_${i}`
          });
        }
        Plotly.newPlot('strain_chart', strainTraces, {title: '12-Channel Microstrain (µε)'});

        // 3 Accelerometer Lines
        let accTraces = [];
        for(let i=1; i<=3; i++) {
          accTraces.push({
            x: timestamps,
            y: data.map(row => row[`ACC_${i}`]),
            name: `ACC_${i}`
          });
        }
        Plotly.newPlot('acc_chart', accTraces, {title: '3-Channel Acceleration Signal (g)'});
      });
  </script>
</body>
</html>
