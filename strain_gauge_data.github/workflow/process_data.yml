name: Process Bridge Sensor Data

on:
  push:
    paths:
      - 'data/*.xlsx'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Data Tools
        run: |
          python -m pip install pandas openpyxl numpy

      - name: Convert Excel to Public JSON
        run: |
          python -c "
          import pandas as pd
          df = pd.read_excel('data/bridge_sensors.xlsx')
          df.tail(100).to_json('docs/data.json', orient='records', date_format='iso')
          "

      - name: Commit Processed JSON Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data.json
          git commit -m "Auto-update live bridge sensor data" || exit 0
          git push
